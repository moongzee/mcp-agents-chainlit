version: '3.8'

services:
  chainlit-app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: chainlit-mcp-agents
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - CHAINLIT_HOST=0.0.0.0
      - CHAINLIT_PORT=8000
      # 환경 변수들을 여기에 추가하세요
      # - ANTHROPIC_API_KEY=your_api_key_here
      # - OPENAI_API_KEY=your_openai_key_here
    volumes:
      # 데이터베이스 영속성을 위한 볼륨 마운트
      - ./data:/app/data
      # 로그 파일을 호스트에 저장
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# 볼륨 정의
volumes:
  app_data:
    driver: local 